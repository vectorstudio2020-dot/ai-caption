<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>ตรวจหวยรัฐบาลล่าสุด</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
<h1>ตรวจหวยรัฐบาล</h1>
<p>ผลสลากกินแบ่งรัฐบาลล่าสุด</p>
</header>

<div class="container">

<div class="card">

<h2>งวดล่าสุด</h2>

<p id="date">Loading...</p>

<div class="grid">

<div>
<p>รางวัลที่ 1</p>
<h3 id="first"></h3>
</div>

<div>
<p>เลขหน้า 3 ตัว</p>
<h3 id="front"></h3>
</div>

<div>
<p>เลขท้าย 3 ตัว</p>
<h3 id="back"></h3>
</div>

<div>
<p>เลขท้าย 2 ตัว</p>
<h3 id="last"></h3>
</div>

</div>

</div>

<div class="card">

<h2>ตรวจหวย</h2>

<input id="checkNumber" placeholder="ใส่เลข 6 หลัก">

<button onclick="check()">ตรวจผล</button>

<p id="result"></p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
