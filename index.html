<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>M4A to MP3 Converter</title>
<script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.6/dist/ffmpeg.min.js"></script>


<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

.box{
background:#1e293b;
padding:30px;
border-radius:10px;
max-width:500px;
margin:auto;
}

button{
padding:10px 20px;
border:none;
background:#22c55e;
color:white;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}
</style>

</head>

<body>

<div class="box">

<h2>M4A → MP3 Converter</h2>

<input type="file" id="fileInput" accept=".m4a">

<br>

<button onclick="convert()">Convert to MP3</button>

<p id="status"></p>

<a id="download" style="display:none">
<button>Download MP3</button>
</a>

</div>

<script>

const { createFFmpeg, fetchFile } = FFmpeg;
const ffmpeg = createFFmpeg({ log: true });

async function convert(){

const status=document.getElementById("status");
const fileInput=document.getElementById("fileInput").files[0];

if(!fileInput){
alert("Upload M4A file first");
return;
}

status.innerText="Loading converter...";

if(!ffmpeg.isLoaded()){
await ffmpeg.load();
}

status.innerText="Converting...";

ffmpeg.FS('writeFile','input.m4a',await fetchFile(fileInput));

await ffmpeg.run('-i','input.m4a','output.mp3');

const data=ffmpeg.FS('readFile','output.mp3');

const url=URL.createObjectURL(new Blob([data.buffer],{type:'audio/mp3'}));

const download=document.getElementById("download");
download.href=url;
download.download="converted.mp3";
download.style.display="block";

status.innerText="Done ✅";

}

</script>

</body>
</html>
